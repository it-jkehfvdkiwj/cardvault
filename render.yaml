databases:
  - name: cardvault-db
    plan: free
    databaseName: cardvault
    user: cardvault

services:
  - type: web
    name: cardvault
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      # Pulled automatically from the managed Postgres above.
      - key: DATABASE_URL
        fromDatabase:
          name: cardvault-db
          property: connectionString
      - key: UPLOAD_DIR
        value: uploads
      - key: ALLOW_DEMO_BILLING
        value: "true"
      - key: ADMIN_EMAILS
        value: quirin06@mail.de
